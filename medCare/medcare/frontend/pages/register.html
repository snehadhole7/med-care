<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MedCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-hospital"></i> MedCare
            </a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container" data-aos="fade-up">
            <h2 class="text-center mb-4">Create Your Account</h2>
            <p class="text-center text-muted mb-4">Join MedCare for better health management</p>
            
            <!-- Alert Messages -->
            <div id="alertContainer"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <small class="text-muted d-block mt-1">At least 3 characters</small>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        <span class="input-group-text" id="emailStatus" style="display: none;">
                            <i class="fas fa-check text-success"></i>
                        </span>
                    </div>
                    <small class="text-muted d-block mt-1">We'll never share your email</small>
                    <small id="emailError" class="text-danger d-block mt-1" style="display: none;"></small>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
                    <small class="text-muted d-block mt-1">Use uppercase, lowercase, and numbers for strength</small>
                    <div id="passwordStrength" class="password-strength mt-2"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                    <small id="passwordMatch" class="text-danger d-block mt-1" style="display: none;">Passwords do not match</small>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" id="terms" name="terms" class="form-check-input" required>
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#" class="text-primary">Terms & Conditions</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">Register</button>
            </form>

            <p class="text-center mt-3">
                Already have an account? <a href="login.html" class="text-primary fw-bold">Login here</a>
            </p>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 MedCare. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../js/common.js"></script>
    <script>
        AOS.init();

        // Real-time validations
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');

        // Email validation - check if already exists
        let emailCheckTimeout;
        emailInput.addEventListener('blur', async () => {
            const email = emailInput.value.trim();
            const emailStatus = document.getElementById('emailStatus');
            const emailError = document.getElementById('emailError');

            if (!email) {
                emailStatus.style.display = 'none';
                emailError.style.display = 'none';
                return;
            }

            // Check if email already exists
            try {
                const response = await apiRequest('/auth/check-email', 'POST', { email });
                if (response.exists) {
                    emailError.textContent = '✗ This email is already registered';
                    emailError.style.display = 'block';
                    emailStatus.style.display = 'none';
                } else {
                    emailError.style.display = 'none';
                    emailStatus.style.display = 'block';
                }
            } catch (error) {
                console.log('Email check not available');
            }
        });

        // Name validation
        nameInput.addEventListener('input', () => {
            const name = nameInput.value.trim();
            if (name.length < 3) {
                nameInput.classList.add('is-invalid');
            } else {
                nameInput.classList.remove('is-invalid');
            }
        });

        // Password strength indicator
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strengthDiv = document.getElementById('passwordStrength');
            let strength = 0;
            let strengthText = '';
            let strengthColor = '';

            if (password.length >= 6) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;

            if (strength < 2) {
                strengthText = '🔴 Weak password';
                strengthColor = '#dc3545';
            } else if (strength < 4) {
                strengthText = '🟡 Fair password';
                strengthColor = '#ffc107';
            } else {
                strengthText = '🟢 Strong password';
                strengthColor = '#28a745';
            }

            strengthDiv.innerHTML = `<small style="color: ${strengthColor};">${strengthText}</small>`;
            checkPasswordMatch();
        });

        // Password match validation
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const matchError = document.getElementById('passwordMatch');

            if (confirmPassword && password !== confirmPassword) {
                matchError.style.display = 'block';
                confirmPasswordInput.classList.add('is-invalid');
            } else if (confirmPassword && password === confirmPassword) {
                matchError.style.display = 'none';
                confirmPasswordInput.classList.remove('is-invalid');
            } else {
                matchError.style.display = 'none';
                confirmPasswordInput.classList.remove('is-invalid');
            }
        }

        confirmPasswordInput.addEventListener('input', checkPasswordMatch);

        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const terms = document.getElementById('terms').checked;

            // Validations
            if (name.length < 3) {
                showAlert('Name must be at least 3 characters long', 'danger');
                return;
            }

            if (!email) {
                showAlert('Please enter a valid email', 'danger');
                return;
            }

            if (password.length < 6) {
                showAlert('Password must be at least 6 characters', 'danger');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'danger');
                return;
            }

            if (!terms) {
                showAlert('Please agree to the Terms & Conditions', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Registering...';

            try {
                const response = await apiRequest('/auth/register', 'POST', { name, email, password });
                
                localStorage.setItem('token', response.token);
                setUser(response.user);
                
                showAlert('🎉 Registration successful! Redirecting to dashboard...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                let errorMsg = error.message;
                if (errorMsg.includes('already exists')) {
                    errorMsg = '⚠️ This email is already registered. Please login or use a different email.';
                }
                showAlert(errorMsg, 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Register';
            }
        });
    </script>
</body>
</html>
