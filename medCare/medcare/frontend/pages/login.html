<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fas fa-hospital"></i> MedCare
            </a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container" data-aos="fade-up">
            <h2 class="text-center mb-2">Welcome Back!</h2>
            <p class="text-center text-muted mb-4">Login to your MedCare account</p>
            
            <!-- Alert Messages -->
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input type="checkbox" id="remember" name="remember" class="form-check-input">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="text-primary text-decoration-none small">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">Login</button>
            </form>

            <p class="text-center mt-3">
                Don't have an account? <a href="register.html" class="text-primary fw-bold">Create one now</a>
            </p>

            <!-- Demo credentials info -->
            <div class="alert alert-info mt-4" role="alert">
                <h6 class="alert-heading">Demo Credentials</h6>
                <small>
                    <strong>Admin:</strong> admin@medcare.com / admin123<br>
                    <strong>User:</strong> user@medcare.com / user123
                </small>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">&copy; 2026 MedCare. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="../js/common.js"></script>
    <script>
        AOS.init();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = document.getElementById('submitBtn');

            if (!email || !password) {
                showAlert('Please enter email and password', 'danger');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';

            try {
                const response = await apiRequest('/auth/login', 'POST', { email, password });
                
                localStorage.setItem('token', response.token);
                setUser(response.user);

                if (remember) {
                    localStorage.setItem('rememberEmail', email);
                } else {
                    localStorage.removeItem('rememberEmail');
                }
                
                showAlert('✓ Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    // Redirect based on role
                    if (response.user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1200);
            } catch (error) {
                showAlert('❌ ' + error.message, 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Login';
            }
        });

        // Load remembered email
        window.addEventListener('load', () => {
            const rememberedEmail = localStorage.getItem('rememberEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>
</html>
